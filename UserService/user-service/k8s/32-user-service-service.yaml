# NodePort for local clusters (minikube, kind, Docker Desktop). Use LoadBalancer on cloud if available.
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: user-service
  labels:
    app: user-service
spec:
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
  selector:
    app: user-service
